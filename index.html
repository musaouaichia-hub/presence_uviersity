<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>نظام الحضور </title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@400;600;700;900&display=swap');

:root {
  --bg: #0a0e1a; --surface: #111827; --card: #1a2235; --border: #2a3548;
  --accent: #1d6fa4; --gold: #f0a500; --green: #10b981; --red: #ef4444;
  --text: #f1f5f9; --text-muted: #64748b; --radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); max-width: 430px; margin: 0 auto; direction: rtl; }

/* صفحات النظام */
.page { display: none; min-height: 100vh; flex-direction: column; }
.page.active { display: flex; }

/* تصميم الواجهة الخلفية (الأنوار) */
#page-landing { background: var(--bg); align-items: center; justify-content: center; padding: 40px 24px; position: relative; overflow: hidden; }
.bg-orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
.orb1 { width: 280px; height: 280px; background: rgba(29,111,164,0.2); top: -80px; left: -60px; }
.orb2 { width: 200px; height: 200px; background: rgba(240,165,0,0.12); bottom: 100px; right: -40px; }

.content-wrap { position: relative; z-index: 1; width: 100%; text-align: center; }
.landing-title { font-family: 'Cairo', sans-serif; font-size: 26px; font-weight: 900; margin-bottom: 10px; }
.landing-title span { color: var(--gold); }
.landing-date-badge { background: var(--card); border: 1px solid var(--border); border-radius: 30px; padding: 8px 20px; font-size: 14px; color: var(--gold); display: inline-block; margin-bottom: 40px; }

/* الأزرار */
.land-btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 14px; display: flex; align-items: center; gap: 15px; }
.land-btn-student { background: linear-gradient(135deg, var(--gold), #d48f00); color: #0a0e1a; box-shadow: 0 6px 20px rgba(240,165,0,0.2); }
.land-btn-admin { background: var(--card); color: var(--text); border: 1px solid var(--border); }

/* البطاقات والمدخلات */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
.header-small { padding: 40px 20px 10px; text-align: center; }
label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; text-align: right; margin-right: 5px;}
input { width: 100%; padding: 14px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; color: white; margin-bottom: 15px; font-family: 'Tajawal'; font-size: 16px; outline: none; }
input:focus { border-color: var(--accent); }

/* الحصص */
.slot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
.slot-btn { padding: 18px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; font-weight: bold; transition: 0.2s; }
.slot-btn.active { background: rgba(29,111,164,0.15); color: var(--accent); border-color: var(--accent); }
.slot-emoji { font-size: 24px; display: block; margin-bottom: 5px; }

.submit-btn { width: 100%; padding: 18px; background: var(--gold); color: #0a0e1a; border: none; border-radius: 15px; font-weight: 900; font-size: 18px; cursor: pointer; margin-top: 10px; }

/* لوحة التحكم */
.admin-list-item { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
.stat-box { display: flex; justify-content: space-around; margin-bottom: 15px; }
.stat-item { text-align: center; background: var(--surface); padding: 10px; border-radius: 10px; flex: 1; margin: 0 5px; }
</style>
</head>
<body>

<div class="page active" id="page-landing">
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="content-wrap">
       <h1>  - جمعية العلماء المسلمين الجزائريين – وهران</h1>
        <h1> - نادي البصائر – كاسطور</h1>
        <div style="font-size: 50px; margin-bottom: 10px;">🎓</div>
       
        <h1 class="landing-title">الدورة العلمية <span>الربيعية</span><br><small style="font-size: 16px; opacity: 0.7;">لعام 1447 / 2026</small></h1>
        <div class="landing-date-badge" id="landing-date">📅 جاري التحميل...</div>
        
        <div style="padding: 0 20px;">
            <button class="land-btn land-btn-student" onclick="goToStudentForm()">
                <span>📱</span> <span>تسجيل حضور طالب</span>
            </button>
            <button class="land-btn land-btn-admin" onclick="showPage('page-admin-login')">
                <span>🔐</span> <span>فضاء الأستاذ</span>
            </button>
        </div>
    </div>
</div>

<div class="page" id="page-student">
    <div class="header-small">
        <h2>تسجيل الحضور</h2>
        <p style="color:var(--text-muted); font-size: 13px;">يرجى إدخال اسمك واختيار الحصة</p>
    </div>
    <div class="card">
        <label>اللقب (NOM)</label>
        <input type="text" id="s-nom" placeholder="مثال: بن محمد">
        <label>الاسم (PRENOM)</label>
        <input type="text" id="s-prenom" placeholder="مثال: أحمد">
    </div>
    <div class="card">
        <p style="text-align:center; font-size: 14px; margin-bottom: 10px;">اختر الحصص التي حضرتها:</p>
        <div class="slot-grid">
            <button class="slot-btn" id="btn-m" onclick="toggleSlot('m')">
                <span class="slot-emoji">☀️</span>بعد العصر
            </button>
            <button class="slot-btn" id="btn-e" onclick="toggleSlot('e')">
                <span class="slot-emoji">🌙</span> بعد المغرب
            </button>
        </div>
        <button class="submit-btn" onclick="submitPresence()">تأكيد التسجيل ✅</button>
        <p onclick="showPage('page-landing')" style="text-align:center; margin-top:15px; font-size:13px; color:var(--text-muted); cursor:pointer;">← العودة للرئيسية</p>
    </div>
</div>

<div class="page" id="page-success" style="text-align:center; justify-content:center;">
    <div style="font-size: 80px;">✅</div>
    <h2 style="color:var(--gold)">تم التسجيل بنجاح!</h2>
    <p id="success-msg" style="margin: 20px;"></p>
    <button class="submit-btn" style="width:200px; margin: 0 auto;" onclick="location.reload()">إغلاق</button>
</div>

<div class="page" id="page-admin-login" style="justify-content:center;">
    <div class="card">
        <h2 style="text-align:center; margin-bottom:20px;">🔐 دخول الإدارة</h2>
        <input type="password" id="admin-pwd" placeholder="كلمة المرور" style="text-align:center;">
        <button class="submit-btn" onclick="checkAdmin()">دخول</button>
        <p onclick="showPage('page-landing')" style="text-align:center; margin-top:15px; font-size:13px; color:var(--text-muted); cursor:pointer;">إلغاء</p>
    </div>
</div>

<div class="page" id="page-admin">
    <div class="header-small"><h2>📊 لوحة التحكم</h2></div>
    <div class="stat-box">
        <div class="stat-item"><div id="stat-total" style="font-size:20px; font-weight:900; color:var(--gold);">0</div><div>طالب</div></div>
    </div>
    <div class="card" style="flex:1; overflow-y:auto; margin-top:0;">
        <div id="admin-list"></div>
    </div>
    <div style="padding: 15px;">
        <button class="submit-btn" style="background:var(--green); color:white;" onclick="downloadExcel()">⬇️ تحميل ملف Excel</button>
        <button class="submit-btn" style="background:var(--red); color:white; font-size:12px; padding:10px;" onclick="resetData()">🗑️ مسح جميع البيانات</button>
    </div>
</div>

<script>
let selM = false; let selE = false;
const ADMIN_PASSWORD = 'prof2024';

// تحديث التاريخ عند التشغيل
const today = new Date();
const dateStr = today.toLocaleDateString('ar-DZ', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
document.getElementById('landing-date').innerText = "📅 " + dateStr;

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
}

function goToStudentForm() {
    showPage('page-student');
}

function toggleSlot(t) {
    if(t === 'm') { selM = !selM; document.getElementById('btn-m').classList.toggle('active'); }
    if(t === 'e') { selE = !selE; document.getElementById('btn-e').classList.toggle('active'); }
}

function submitPresence() {
    const nom = document.getElementById('s-nom').value.trim();
    const pre = document.getElementById('s-prenom').value.trim();
    
    if(!nom || !pre) return alert("يرجى إدخال اللقب والاسم");
    if(!selM && !selE) return alert("يرجى اختيار حصة واحدة على الأقل");

    // L'URL que vous avez copiée à l'étape 2
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyuLboCGVeLwRuvBamj4atmZhMZdJQ9OuPQjhrqQGIaSVcYxFNb9F9USVyGgf7D_PWwJA/exec";

    const data = {
        n: nom, p: pre,
        m: selM ? "حاضر" : "غائب",
        e: selE ? "حاضر" : "غائب",
        d: new Date().toLocaleDateString('ar-DZ'),
        t: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})
    };

    // Afficher un message de chargement
    const btn = document.querySelector('.submit-btn');
    btn.innerText = "... جاري الإرسال";
    btn.disabled = true;

    // Envoi vers Google Sheets
    fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors', // Important pour éviter les erreurs de sécurité
        body: JSON.stringify(data)
    })
    .then(() => {
        document.getElementById('success-msg').innerText = "شكراً لك " + pre + "، تم حفظ حضورك في الجدول.";
        showPage('page-success');
    })
    .catch(error => {
        alert("خطأ في الاتصال بالإنترنت");
        btn.innerText = "تأكيد التسجيل ✅";
        btn.disabled = false;
    });
}

function checkAdmin() {
    if(document.getElementById('admin-pwd').value === ADMIN_PASSWORD) {
        loadAdminData();
        showPage('page-admin');
    } else {
        alert("كلمة المرور خاطئة!");
    }
}

function loadAdminData() {
    let db = JSON.parse(localStorage.getItem('presence_v3_db') || '[]');
    document.getElementById('stat-total').innerText = db.length;
    let html = "";
    db.reverse().forEach(r => {
        html += `<div class="admin-list-item">
            <b>${r.n} ${r.p}</b> <br>
            <span style="font-size:12px; color:${r.m==='حاضر'?'var(--green)':'var(--text-muted)'}"بعد العصر: ${r.m}</span> | 
            <span style="font-size:12px; color:${r.e==='حاضر'?'var(--green)':'var(--text-muted)'}">بعد المغرب: ${r.e}</span>
            <div style="font-size:10px; opacity:0.5; margin-top:5px;">${r.d} - ${r.t}</div>
        </div>`;
    });
    document.getElementById('admin-list').innerHTML = html || "<p style='text-align:center; padding:20px;'>لا يوجد مسجلين بعد</p>";
}

function downloadExcel() {
    let db = JSON.parse(localStorage.getItem('presence_v3_db') || '[]');
    let csv = "\ufeffاللقب,الاسم,حصة الصباح,حصة المساء,التاريخ,الوقت\n";
    db.forEach(r => { csv += `${r.n},${r.p},${r.m},${r.e},${r.d},${r.t}\n`; });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "presence_1447.csv";
    link.click();
}

function resetData() {
    if(confirm("هل أنت متأكد من حذف جميع بيانات الحضور؟ لا يمكن التراجع عن هذا الإجراء.")) {
        localStorage.removeItem('presence_v3_db');
        loadAdminData();
    }
}
</script>
</body>
</html>
