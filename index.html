<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>نظام الحضور الجامعي</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@400;600;700;900&display=swap');

:root {
  --bg: #0a0e1a; --surface: #111827; --card: #1a2235; --border: #2a3548;
  --accent: #1d6fa4; --gold: #f0a500; --green: #10b981; --red: #ef4444;
  --text: #f1f5f9; --text-muted: #64748b; --radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); max-width: 430px; margin: 0 auto; direction: rtl; }

.page { display: none; min-height: 100vh; flex-direction: column; }
.page.active { display: flex; }

#page-landing { background: var(--bg); align-items: center; justify-content: center; padding: 40px 24px; position: relative; overflow: hidden; }
.bg-orb { position: absolute; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
.orb1 { width: 280px; height: 280px; background: rgba(29,111,164,0.2); top: -80px; left: -60px; }
.orb2 { width: 200px; height: 200px; background: rgba(240,165,0,0.12); bottom: 100px; right: -40px; }

.content-wrap { position: relative; z-index: 1; width: 100%; text-align: center; }
.landing-title { font-family: 'Cairo', sans-serif; font-size: 22px; font-weight: 900; margin-bottom: 10px; color: white; }
.landing-title span { color: var(--gold); }
.landing-date-badge { background: var(--card); border: 1px solid var(--border); border-radius: 30px; padding: 8px 20px; font-size: 14px; color: var(--gold); display: inline-block; margin-bottom: 40px; }

.land-btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 14px; display: flex; align-items: center; gap: 15px; text-decoration: none; justify-content: center;}
.land-btn-student { background: linear-gradient(135deg, var(--gold), #d48f00); color: #0a0e1a; box-shadow: 0 6px 20px rgba(240,165,0,0.2); }
.land-btn-admin { background: var(--card); color: var(--text); border: 1px solid var(--border); }

.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
input { width: 100%; padding: 14px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; color: white; margin-bottom: 15px; font-family: 'Tajawal'; font-size: 16px; outline: none; text-align: right; }
input:focus { border-color: var(--accent); }
label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; text-align: right; }

.group-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
.group-item { background: var(--surface); border: 1.5px solid var(--border); padding: 12px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; color: var(--text-muted); font-weight: bold; }
.group-item input { display: none; }
.group-item:has(input:checked) { background: rgba(29, 111, 164, 0.2); border-color: var(--gold); color: var(--gold); box-shadow: 0 0 10px rgba(240, 165, 0, 0.2); }

.submit-btn { width: 100%; padding: 18px; background: var(--gold); color: #0a0e1a; border: none; border-radius: 15px; font-weight: 900; font-size: 18px; cursor: pointer; margin-top: 10px; }
</style>
</head>
<body>

<div class="page active" id="page-landing">
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="content-wrap">
       <h1> University of Science and Technology Mohammed Boudiaf Oran</h1>
        <h2> Faculty of Physics</h2>
        <h2> Department of Basics Physics</h2>
        <div style="font-size: 50px; margin-bottom: 10px;">🎓</div>
       <h1 class="landing-title">Computer Science Lab</h1>
       <div class="landing-date-badge" id="landing-date">📅 loading...</div>
       
       <div style="padding: 0 20px;">
           <button class="land-btn land-btn-student" onclick="goToStudentForm()">
               <span>📱</span> <span>Student Attendance</span>
           </button>
           <button class="land-btn land-btn-admin" onclick="showPage('page-admin-login')">
               <span>🔐</span> <span>Teacher’s Area</span>
           </button>
       </div>
    </div>
</div>

<div class="page" id="page-student">
    <div style="text-align: center; padding: 30px 20px 10px;">
        <h2>Attendance Registration</h2>
    </div>
    <div class="card">
        <label>اللقب (Name)</label>
        <input type="text" id="s-nom" placeholder="Ex: BENMOHAMMED">
        <label>الاسم (First_name)</label>
        <input type="text" id="s-prenom" placeholder="Ex: Ahmed">
    </div>
    <div class="card">
        <p style="text-align:center; margin-bottom:15px; font-size:14px;"> Choose your Groupe :</p>
        <div class="group-grid">
            <label class="group-item"><input type="radio" name="groupe" value="G53"> G53</label>
            <label class="group-item"><input type="radio" name="groupe" value="G57"> G57</label>
            <label class="group-item"><input type="radio" name="groupe" value="G71"> G71</label>
            <label class="group-item"><input type="radio" name="groupe" value="G75"> G75</label>
            <label class="group-item"><input type="radio" name="groupe" value="G79"> G79</label>
        </div>
        <button class="submit-btn" id="btn-submit" onclick="submitPresence()">تأكيد الحضور ✅</button>
        <p onclick="showPage('page-landing')" style="text-align:center; margin-top:15px; font-size:12px; color:var(--text-muted); cursor:pointer;">← Back</p>
    </div>
</div>

<div class="page" id="page-success" style="text-align:center; justify-content:center;">
    <div style="font-size: 80px;">✅</div>
    <h2 style="color:var(--gold)">Success!</h2>
    <p id="success-msg" style="margin: 20px;"></p>
    <button class="submit-btn" style="width:200px; margin: 0 auto;" onclick="location.reload()">Close</button>
</div>

<div class="page" id="page-admin-login" style="justify-content:center;">
    <div class="card">
        <h2 style="text-align:center; margin-bottom:20px;">🔐 Teacher Login</h2>
        <input type="password" id="admin-pwd" placeholder="Password" style="text-align:center;">
        <button class="submit-btn" onclick="checkAdmin()">Login</button>
        <p onclick="showPage('page-landing')" style="text-align:center; margin-top:15px; font-size:13px; color:var(--text-muted); cursor:pointer;">Cancel</p>
    </div>
</div>

<script>
  window.onload = function() {
    const SCRIPT_URL = "VOTRE_URL_ICI";
    
    // On demande au Google Sheet si on peut afficher le formulaire
    fetch(SCRIPT_URL)
    .then(response => response.text())
    .then(status => {
        if (status.trim() !== "OUVERT") {
            document.body.innerHTML = `
                <div style="text-align:center; padding:50px; color:white; background:#0a0e1a; height:100vh;">
                    <div style="font-size:50px;">🔒</div>
                    <h2>التسجيل مغلق حاليا</h2>
                    <p> Registration is closed. Please wait for the teacher's permission..</p>
                </div>`;
        }
    });
};
const ADMIN_PASSWORD = 'prof_mus_2026@#';
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxs_8Fn8RjIyq5YcTlXK0bpz8xvNQReoZ1b5yu1CDJwQ4f6rSmjS_fbpY2bauiq-p8n9A/exec";

// Affichage de la date
const today = new Date();
const dateStr = today.toLocaleDateString('ar-DZ', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
document.getElementById('landing-date').innerText = "📅 " + dateStr;

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
}

function goToStudentForm() {
    showPage('page-student');
}

// --- 1. AU CHARGEMENT : Bloquer si déjà fait aujourd'hui ---
window.onload = function() {
    // Vérifier le statut OUVERT/FERME (ton code actuel)
    checkStatus(); 

    // Vérifier si l'étudiant a déjà cliqué aujourd'hui
    const hasRegistered = localStorage.getItem('done_' + new Date().toLocaleDateString());
    if (hasRegistered) {
        document.getElementById('page-student').innerHTML = `
            <div class="card" style="text-align:center; padding:40px;">
                <div style="font-size:50px;">🚫</div>
                <h2 style="color:var(--gold)">Désolé !</h2>
                <p>Vous avez déjà enregistré une présence depuis cet appareil aujourd'hui.</p>
            </div>`;
    }
};

// --- 2. LA FONCTION D'ENVOI ---
function submitPresence() {
    const nom = document.getElementById('s-nom').value.trim();
    const pre = document.getElementById('s-prenom').value.trim();
    const groupeRadio = document.querySelector('input[name="groupe"]:checked');
    const btn = document.getElementById('btn-submit');

    if(!nom || !pre || !groupeRadio) {
        return alert("Veuillez remplir tous les champs !");
    }

    // ACTION : Le bouton disparaît immédiatement après le clic
    btn.style.display = 'none'; 

    const data = {
        n: nom,
        p: pre,
        g: groupeRadio.value,
        d: new Date().toLocaleDateString('fr-FR'),
        t: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})
    };

    fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(data)
    })
    .then(() => {
        // On marque le téléphone comme "ayant déjà fait le travail"
        localStorage.setItem('done_' + new Date().toLocaleDateString(), 'true');
        
        document.getElementById('success-msg').innerText = "Done " + pre + ", recorded.";
        showPage('page-success');
    })
    .catch(error => {
        alert("Erreur réseau");
        btn.style.display = 'block'; // On fait réapparaître le bouton seulement en cas d'échec réel
    });
}

function checkAdmin() {
    if(document.getElementById('admin-pwd').value === ADMIN_PASSWORD) {
        alert("Admin feature is linked to Google Sheets");
        showPage('page-landing');
    } else {
        alert("Wrong Password!");
    }
}
</script>
</body>
</html>
